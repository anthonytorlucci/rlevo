[book]
title = "rlevo: Contributor Guide"
authors = ["Anthony Torlucci"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "rust"
git-repository-url = "https://github.com/anthonytorlucci/rlevo"
edit-url-template = "https://github.com/anthonytorlucci/rlevo/edit/main/docs/contributor-book/{path}"

[preprocessor.wikilinks]
command = "mdbook-wikilinks"
# base_path configures how [[wikilinks]] resolve. Set to the vault's ADR
# directory path or a URL prefix when building for GitHub Pages.
base_path = "decisions"
