name: integration-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: integration tests (non-ignored)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install just
        uses: taiki-e/install-action@2b818c67b359d9778206f1396bde7f4381ebfeda # just

      - name: Cross-crate integration
        run: just test-integration

      - name: Recording episode-count regression
        run: just test-recording

      - name: Evaluator harness smoke
        run: just test-evaluator

      - name: Rastrigin-D10 EA suite
        run: just test-rastrigin

      - name: Swarm strategies suite
        run: just test-swarm

      - name: Report pipeline smoke
        run: just test-report-smoke
