# Regression net for the visualisation/recording/reporting/harness examples.
#
# These examples live in `crates/rlevo-examples/` (ADR 0012). They are all
# `required-features`-gated or depend on `rlevo-benchmarks`, so a plain
# `cargo build` / `cargo test` never compiles them — that is how ~10 examples
# once shipped non-compiling (the `std` vs `parking_lot` Mutex split, ADR 0010)
# without anyone noticing.
#
# This job compiles every example in `rlevo-examples` with the full feature
# set. It is build-only: actually running them needs a tty (TUI), `--release`
# wall-clock (PPO/EA), and a `trunk`-built WASM bundle (`*_with_client`).
# Compiling is enough to catch producer-API drift like the Mutex split.
#
# See research note `viz-mutex-and-ci-gap` (Root cause B) for the rationale.
name: viz-examples

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: viz-examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-examples:
    name: build + clippy (viz examples, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # The toolchain (channel + rustfmt/clippy components) is governed by
      # rust-toolchain.toml at the repo root; rustup auto-installs the pin on
      # the first cargo invocation.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # The examples pull rapier2d (box2d), rapier3d (locomotion), and
      # burn-wgpu. None need a GPU to *compile*; libudev is the only
      # build-time system dep on a headless runner.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Install just
        uses: taiki-e/install-action@2b818c67b359d9778206f1396bde7f4381ebfeda # just

      - name: Build viz examples (full feature set)
        run: just build-vis-examples

      - name: Clippy viz examples (full feature set)
        run: just clippy-vis-examples
