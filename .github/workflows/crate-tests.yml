name: crate-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: crate-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # docs/rules.md §4: tensor host-reads must propagate transfer errors —
  # `.unwrap_or_default()` substitutes an empty buffer for a real failure.
  # Line-local grep: catches the common single-line chain; multi-line chains
  # remain covered by review convention. rlevo-evolution is excluded until
  # the #136 sweep lands.
  tensor-read-hygiene:
    name: tensor-read hygiene grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Forbid unwrap_or_default on tensor host-reads
        run: |
          hits=$(grep -rnE "(into_vec|into_data|to_vec)[^;]*unwrap_or_default" \
            crates/rlevo-core/src \
            crates/rlevo-environments/src \
            crates/rlevo-reinforcement-learning/src \
            crates/rlevo-hybrid/src \
            crates/rlevo/src || true)
          if [ -n "$hits" ]; then
            echo "::error::unwrap_or_default() on a tensor host-read (see docs/rules.md, Error Handling):"
            echo "$hits"
            exit 1
          fi

  # Issue #391: `[workspace.lints]` is inert on a member crate unless that
  # member opts in with `[lints] workspace = true`. Four crates silently
  # lacked it, so the workspace lint table was decorative on them and CI was
  # green because nothing was being checked — not because the code was clean.
  # Nothing in the toolchain reports this; a new crate reintroduces it by
  # simply not adding the stanza. This job is the only thing that notices.
  workspace-lints-optin:
    name: workspace lints opt-in
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Every crate must opt into the workspace lint table
        run: |
          missing=""
          for manifest in crates/*/Cargo.toml; do
            # `workspace = true` must appear inside the `[lints]` table
            # specifically — a bare match would also accept it under
            # `[dependencies]`, `[package]`, or any other section.
            if ! awk '
              /^\[lints\]/    { in_lints = 1; next }
              /^\[/           { in_lints = 0 }
              in_lints && /^[[:space:]]*workspace[[:space:]]*=[[:space:]]*true/ { found = 1 }
              END             { exit !found }
            ' "$manifest"; then
              missing="$missing  $manifest\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::crate manifests missing '[lints] workspace = true' (see issue #391):"
            printf "$missing"
            echo "Without this stanza the workspace lint table does not apply to the crate."
            exit 1
          fi
          echo "all crate manifests opt into [workspace.lints]"

  # Issue #519: the `test` matrix below is hand-maintained, and nothing in cargo
  # notices when a crate is missing from it — the crate's tests simply never
  # run, and CI is green because nothing was checked. That is how `rlevo`'s 22
  # test binaries, plus every test in four other crates, stayed out of the pull
  # request gate. Same silent-inertness class as the #391 lint-opt-in job above,
  # and the same remedy: make the omission fail the build.
  test-matrix-coverage:
    name: test matrix covers every crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Every workspace crate must appear in the test matrix
        run: |
          # No exclusions: the matrix is total over `crates/*/`. If a crate ever
          # genuinely cannot be tested in the gate, add it to an `excluded` list
          # here together with the reason — do not silently drop it from the
          # matrix, which is the failure mode this job exists to prevent.
          missing=""
          for dir in crates/*/; do
            crate=$(basename "$dir")
            # Whole-line match against a YAML list item, so `rlevo` is not
            # considered covered by `rlevo-core`. Bare `- <name>` items appear
            # only under the matrix's `crate:` key; every other list in this
            # file is a mapping (`- uses:`, `- name:`, `- crate:`).
            if ! grep -qE "^ +- ${crate}\$" .github/workflows/crate-tests.yml; then
              missing="$missing  $crate\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::workspace crates absent from the crate-tests matrix (see issue #519):"
            printf "$missing"
            echo "A crate outside the matrix has its tests run by no pull-request check."
            echo "Add it to the matrix, or to this job's 'excluded' list with a reason."
            exit 1
          fi
          echo "every workspace crate is covered by the test matrix"

  # ADR 0042 / issue #128: `box2d` and `locomotion` are orthogonal
  # rlevo-environments features (neither implies the other) — a shared type
  # gated behind only one of them silently breaks the other's build. Two
  # cheap steps in isolation catch that class of bug; the full
  # `cargo hack --feature-powerset` sweep is deliberately deferred (own issue).
  #
  # These run `clippy`, not `check`. `clippy` subsumes `check`, and linting
  # under each feature in isolation catches a failure mode that linting under
  # `--all-features` cannot: `clippy --fix` rewriting a closure into a trait
  # path resolved from an *optional* dependency. That happened on #398 —
  # `|v| v.is_finite()` in two `locomotion` modules became
  # `rapier2d::math::ComplexField::is_finite`, naming a crate gated behind
  # `box2d`. Under `--all-features` rapier2d is linked and it compiles; the
  # locomotion-only build is where it breaks.
  feature-orthogonality:
    name: rlevo-environments feature orthogonality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: feature-orthogonality

      - name: Lint box2d in isolation
        run: >
          cargo clippy -p rlevo-environments --all-targets
          --no-default-features --features box2d -- -D warnings

      - name: Lint locomotion in isolation
        run: >
          cargo clippy -p rlevo-environments --all-targets
          --no-default-features --features locomotion -- -D warnings

  # Issue #519: a crate absent from this matrix has its tests compiled and run
  # by no pull-request check. `rlevo` was the case that surfaced it — all 22 of
  # its `crates/rlevo/tests/*.rs` binaries were reachable only by
  # `weekly-tests.yml`, which runs `-- --ignored` and therefore *filters out*
  # every non-ignored test in them. Four further crates were absent for no
  # recorded reason at all. Keep this list total over `crates/*/`; the
  # `test-matrix-coverage` job below fails the build if it drifts.
  test:
    name: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - rlevo-core
          - rlevo-benchmarks
          - rlevo-benchmarks-report-client
          - rlevo-environments
          - rlevo-evolution
          - rlevo-examples
          - rlevo-hybrid
          - rlevo-metrics-registry
          - rlevo-reinforcement-learning
          - rlevo-test-support
          - rlevo
        include:
          # `crates/rlevo/tests/recording_episode_count.rs` and
          # `cartpole_report_smoke.rs` use `rlevo_benchmarks::record` and the
          # report emitter unconditionally — neither file is `#![cfg]`-gated —
          # and `viz-report` is not among `rlevo`'s default features. A bare
          # `cargo test -p rlevo` therefore fails to *compile* those two
          # binaries rather than skipping them.
          - crate: rlevo
            features: --features viz-report
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: crate-tests-${{ matrix.crate }}

      # `matrix.features` is empty for every crate without an `include:` entry.
      - name: Test ${{ matrix.crate }}
        run: cargo test --package ${{ matrix.crate }} ${{ matrix.features }}
