name: weekly-tests

on:
  schedule:
    # 02:00 UTC every Sunday
    - cron: "0 2 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Only one weekly run at a time; a new schedule trigger cancels a stale one.
concurrency:
  group: weekly-tests
  cancel-in-progress: true

jobs:
  # ── Smoke / modest-convergence tests ────────────────────────────────────────
  #
  # Each algorithm gets an independent job so failures are isolated and
  # individual jobs can be re-run without re-running the full matrix.
  # timeout-minutes: 15 bounds a diverging run on a slow runner.
  smoke:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "DQN — CartPole reaches 100"
            recipe: test-dqn-cart-pole
          - name: "DQN — short run finite rewards"
            recipe: test-dqn-short
          - name: "C51 — CartPole reaches 100"
            recipe: test-c51-cart-pole
          - name: "QR-DQN — CartPole reaches 50"
            recipe: test-qrdqn-cart-pole
          - name: "PPO — CartPole reaches 100"
            recipe: test-ppo-cart-pole
          - name: "PPO — Pendulum improves over random"
            recipe: test-ppo-pendulum
          - name: "PPG — CartPole reaches modest threshold"
            recipe: test-ppg-cart-pole
          - name: "PPG — without aux matches PPO baseline"
            recipe: test-ppg-no-aux
          - name: "PPG — aux phase actually runs"
            recipe: test-ppg-aux
          - name: "PPG — CartPole reaches 475"
            recipe: test-ppg-full
          - name: "DDPG — Pendulum smoke"
            recipe: test-ddpg-pendulum
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key per matrix job so jobs don't thrash each other.
          key: weekly-${{ matrix.recipe }}

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run ${{ matrix.name }}
        run: just ${{ matrix.recipe }}

  # ── Full acceptance tests (~500k steps) ─────────────────────────────────────
  #
  # Long-running convergence tests. Run every week alongside the smoke suite,
  # and on-demand via workflow_dispatch. Promote to the smoke job when runtimes
  # become acceptable as hardware improves.
  acceptance:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "QR-DQN — full acceptance (~500k steps)"
            recipe: test-qrdqn-full
          - name: "TD3 — Pendulum smoke (~500k steps)"
            recipe: test-td3-pendulum
          - name: "SAC — Pendulum smoke (~500k steps)"
            recipe: test-sac-pendulum
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: weekly-${{ matrix.recipe }}

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run ${{ matrix.name }}
        run: just ${{ matrix.recipe }}
