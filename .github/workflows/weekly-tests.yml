name: weekly-tests

on:
  schedule:
    # 02:00 UTC every Sunday
    - cron: "0 2 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Only one weekly run at a time; a new schedule trigger cancels a stale one.
concurrency:
  group: weekly-tests
  cancel-in-progress: true

jobs:
  # ── Per-algorithm regression suites ─────────────────────────────────────────
  #
  # The heavy RL convergence / reproducibility tests all carry `#[ignore]`, so
  # the fast `test-workspace` suite skips them. This job runs every ignored test
  # in an algorithm's integration binary in one shot:
  #
  #     cargo test --release --test <binary> -- --ignored
  #
  # One matrix job per algorithm keeps failures isolated and individually
  # re-runnable. Invoking the binary (not individual test names) is deliberate:
  # the heavy tests are macro-generated (`rl_learning_test!` /
  # `rl_reproducibility_test!`) and were renamed once already — enumerating names
  # here is exactly what drifts. `--release` keeps the training runs inside the
  # timeout. QR-DQN's hours-long `qrdqn_cartpole_acceptance` is `--skip`ped here
  # and runs in the separate `acceptance` job below.
  regression:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "DQN — heavy suite (CartPole converge + reproducibility)"
            bin: dqn_integration
          - name: "C51 — heavy suite (CartPole converge + reproducibility)"
            bin: c51_integration
          - name: "QR-DQN — heavy suite (excludes acceptance)"
            bin: qrdqn_integration
            skip: qrdqn_cartpole_acceptance
          - name: "PPO — heavy suite (CartPole converge + Pendulum + reproducibility)"
            bin: ppo_integration
          - name: "PPG — heavy suite (aux phases, CartPole + reproducibility)"
            bin: ppg_integration
          - name: "DDPG — heavy suite (LinearEnv + Pendulum)"
            bin: ddpg_integration
          - name: "TD3 — heavy suite (LinearEnv + Pendulum 500k)"
            bin: td3_integration
          - name: "SAC — heavy suite (LinearEnv + Pendulum)"
            bin: sac_integration
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key per matrix job so jobs don't thrash each other.
          key: weekly-${{ matrix.bin }}

      - name: Run ${{ matrix.name }}
        run: >-
          cargo test --release -p rlevo --test ${{ matrix.bin }}
          -- --ignored
          ${{ matrix.skip && format('--skip {0}', matrix.skip) }}

  # ── Full acceptance tests (~hours) ──────────────────────────────────────────
  #
  # Hours-long full-solve runs that won't fit the regression job's timeout. Run
  # every week alongside the regression suite, and on-demand via
  # workflow_dispatch. Promote a test into the regression job when its runtime
  # becomes acceptable as hardware improves.
  acceptance:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "QR-DQN — CartPole acceptance (500k steps, reward ≥ 195)"
            bin: qrdqn_integration
            test: qrdqn_cartpole_acceptance
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: weekly-${{ matrix.bin }}

      - name: Run ${{ matrix.name }}
        run: >-
          cargo test --release -p rlevo --test ${{ matrix.bin }}
          -- --ignored ${{ matrix.test }}
